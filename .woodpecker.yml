---
when:
  - event: push
    branch: main
  - event: cron
    cron: weekly-build
  - event: manual

variables:
  - &ftp_env
    FTP_PASSWORD:
      from_secret: ftp_password

steps:
  - name: build-iso-main
    image: ghcr.io/ublue-os/devcontainer:latest
    privileged: true
    commands:
      - just build-iso blossomos main main

  - name: upload-iso-main
    image: ghcr.io/ublue-os/devcontainer:latest
    environment:
      <<: *ftp_env
    commands:
      - just upload-ftp main
    depends_on: [build-iso-main]

  - name: build-iso-nvidia-open
    image: ghcr.io/ublue-os/devcontainer:latest
    privileged: true
    commands:
      - just build-iso blossomos main nvidia-open

  - name: upload-iso-nvidia-open
    image: ghcr.io/ublue-os/devcontainer:latest
    environment:
      <<: *ftp_env
    commands:
      - just upload-ftp nvidia-open
    depends_on: [build-iso-nvidia-open]
